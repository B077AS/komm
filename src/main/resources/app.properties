# Komm Default Configuration

# API Configuration — filled in from the pom's hub.url / hub.ws.url at build
# time (Maven resource filtering): localhost by default, the official hub
# (https://kommvoice.com) with the prod profile (-Ppackage,prod). A -Dapi.url=
# runtime override still wins over both for dev runs.
api.url=${hub.url}
websocket.url=${hub.ws.url}

# Client version — read by the hub's ClientUpdateController (/api/client/latest)
# out of this entry inside the shaded jar, and compared by the launcher against
# the locally installed copy. Filled in from the pom's <version> at build time
# (Maven resource filtering) — the pom is the single source of truth; the
# release workflow sets it from the git tag.
client.version=${project.version}